<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate/Grand Order DataBase</title>
    <style>
        :root {
            --bg: #0b0b1a;
            --card-bg: #1a1a2e;
            --text: #e0e0e0;
            --gold: #c9a84c;
            --accent: #16213e;
            --border: #2a2a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(26,26,46,0.9) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--gold), #f0d060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        .search-wrapper input {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }
        .search-wrapper input:focus { border-color: var(--gold); }
        .filters {
            display: flex; flex-wrap: wrap; gap: 0.5rem;
            justify-content: center; margin-bottom: 2rem;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,168,76,0.1);
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .servant-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .servant-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            border-color: var(--gold);
        }
        .card-image, .card-image-placeholder {
            width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
        }
        .card-image-placeholder {
            background: linear-gradient(135deg, var(--accent), #1a1a3e);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: #444;
        }
        .card-info { padding: 1rem; }
        .card-name {
            font-weight: 600; margin-bottom: 0.5rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .class-badge {
            display: inline-block; padding: 0.2rem 0.6rem;
            border-radius: 12px; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase;
        }
        .stars { color: var(--gold); margin-left: 0.5rem; }
        .loading, .error, .no-results {
            text-align: center; padding: 3rem; font-size: 1.1rem;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #ef4444; }
        .no-results { color: #888; }
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
            z-index: 200; align-items: center; justify-content: center; padding: 1.5rem;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 20px; max-width: 700px; width: 100%;
            max-height: 85vh; overflow-y: auto; padding: 2rem; position: relative;
        }
        .modal-close {
            position: absolute; top: 1rem; right: 1.25rem;
            background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer;
        }
        .modal-close:hover { color: #fff; }
        @media (max-width: 600px) {
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <h1>⚔️ Fate/Grand Order</h1>
    <p style="color:#888; font-size:0.9rem;">Dados dos Servos · Atlas Academy API</p>
</header>
<div class="container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Buscar por nome (ex: Artoria, Gilgamesh, Mash)" autocomplete="off">
    </div>
    <div class="filters" id="filtersContainer">
        <button class="filter-btn active" data-class="">Todos</button>
    </div>
    <div id="statusMessage" class="loading">
        <div class="spinner"></div>
        <p>Carregando servos...</p>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    (() => {
        const API = 'https://api.atlasacademy.io';
        const REGION = 'NA';

        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const filtersContainer = document.getElementById('filtersContainer');
        const statusMessage = document.getElementById('statusMessage');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        let allServants = [];
        let filteredServants = [];
        let currentClass = '';

        // Classes comuns
        const CLASS_NAMES = [
            'saber','archer','lancer','rider','caster','assassin','berserker',
            'ruler','avenger','mooncancer','alterego','foreigner','pretender','shielder','beast'
        ];

        // Buscar servos por várias letras para montar uma lista grande
        async function fetchAllServants() {
            const unique = new Map();
            const letters = 'aeiouy'.split(''); // letras comuns
            let successCount = 0;

            for (const letter of letters) {
                try {
                    const url = `${API}/nice/${REGION}/servant/search?name=${letter}`;
                    const resp = await fetch(url);
                    if (!resp.ok) continue;
                    const data = await resp.json();
                    if (Array.isArray(data)) {
                        data.forEach(s => {
                            if (s.type === 'heroine' || s.type === 'normal') {
                                if (!unique.has(s.id)) unique.set(s.id, s);
                            }
                        });
                        successCount++;
                    }
                } catch (err) {
                    console.warn(`Falha ao buscar letra '${letter}':`, err);
                }
            }

            if (successCount === 0) {
                throw new Error('Não foi possível conectar à API do Atlas Academy. Verifique sua conexão ou tente novamente mais tarde.');
            }

            return Array.from(unique.values()).sort((a,b) => (a.collectionNo||0) - (b.collectionNo||0));
        }

        // Montar filtros de classe
        function buildFilters() {
            const classes = new Set();
            allServants.forEach(s => { if(s.className) classes.add(s.className.toLowerCase()); });

            filtersContainer.innerHTML = '<button class="filter-btn active" data-class="">Todos</button>';
            CLASS_NAMES.forEach(cls => {
                if (classes.has(cls)) {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.dataset.class = cls;
                    btn.textContent = cls.charAt(0).toUpperCase() + cls.slice(1);
                    filtersContainer.appendChild(btn);
                }
            });

            filtersContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    filtersContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentClass = btn.dataset.class;
                    applyFilters();
                });
            });
        }

        // Aplicar filtros e busca
        function applyFilters() {
            const query = searchInput.value.trim().toLowerCase();
            filteredServants = allServants.filter(s => {
                if (currentClass && s.className?.toLowerCase() !== currentClass) return false;
                if (query) {
                    const name = (s.name || '').toLowerCase();
                    const original = (s.originalName || '').toLowerCase();
                    return name.includes(query) || original.includes(query);
                }
                return true;
            });
            renderCards();
        }

        // Imagem do servo
        function getImage(servant) {
            try {
                return servant.extraAssets?.charaGraph?.ascension?.['1'] || null;
            } catch { return null; }
        }

        // Renderizar cards
        function renderCards() {
            resultsGrid.innerHTML = '';
            if (filteredServants.length === 0) {
                statusMessage.style.display = 'block';
                statusMessage.innerHTML = '<p class="no-results">Nenhum servo encontrado.</p>';
                return;
            }
            statusMessage.style.display = 'none';

            filteredServants.forEach(s => {
                const img = getImage(s);
                const card = document.createElement('div');
                card.className = 'servant-card';
                card.innerHTML = `
                    ${img
                        ? `<img src="${img}" alt="${s.name}" class="card-image" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
                        : ''}
                    <div class="card-image-placeholder" style="${img ? 'display:none' : ''}">⚔️</div>
                    <div class="card-info">
                        <div class="card-name">${s.name || '???'}</div>
                        <span class="class-badge class-${(s.className||'').toLowerCase()}">${s.className||'???'}</span>
                        <span class="stars">${'★'.repeat(s.rarity||0)}</span>
                    </div>
                `;
                card.addEventListener('click', () => openModal(s));
                resultsGrid.appendChild(card);
            });
        }

        // Abrir modal com detalhes
        async function openModal(servant) {
            let detail = servant;
            try {
                const url = `${API}/nice/${REGION}/servant/${servant.collectionNo || servant.id}?lore=true`;
                const resp = await fetch(url);
                if (resp.ok) detail = await resp.json();
            } catch (e) {}

            const img = getImage(detail);
            modalBody.innerHTML = `
                <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem;">
                    ${img ? `<img src="${img}" style="width:120px; height:120px; border-radius:16px; object-fit:cover;">` : ''}
                    <div>
                        <h2 style="margin-bottom:0.2rem;">${detail.name || '???'}</h2>
                        <p style="color:#888;">${detail.originalName || ''}</p>
                        <span class="class-badge class-${(detail.className||'').toLowerCase()}">${detail.className||'?'}</span>
                        <span class="stars">${'★'.repeat(detail.rarity||0)}</span>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; margin-bottom:1.5rem;">
                    ${[
                        ['HP Máx', detail.hpMax],
                        ['ATK Máx', detail.atkMax],
                        ['Custo', detail.cost],
                        ['Nível Máx', detail.lvMax]
                    ].map(([label,val]) => `
                        <div style="background:#16213e; border-radius:8px; padding:0.5rem; text-align:center;">
                            <div style="font-size:0.7rem; color:#888;">${label}</div>
                            <div style="font-weight:bold; color:#c9a84c;">${val||'?'}</div>
                        </div>
                    `).join('')}
                </div>
                ${detail.skills?.length ? `
                <div style="margin-bottom:1rem;">
                    <h3 style="color:#c9a84c;">⚡ Habilidades</h3>
                    <ul>${detail.skills.map(s => `<li>${s.name || '???'}</li>`).join('')}</ul>
                </div>` : ''}
                ${detail.noblePhantasms?.length ? `
                <div style="margin-bottom:1rem;">
                    <h3 style="color:#c9a84c;">✨ Noble Phantasm</h3>
                    <ul>${detail.noblePhantasms.map(np => `<li><strong>${np.name||'???'}</strong> ${np.card ? '['+np.card+']' : ''} Rank ${np.rank||'?'}</li>`).join('')}</ul>
                </div>` : ''}
            `;
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // Fechar modal
        modalClose.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        });
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }});

        // Busca com debounce
        let timeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(applyFilters, 300);
        });

        // Inicialização
        (async () => {
            try {
                statusMessage.innerHTML = '<div class="spinner"></div><p>Conectando ao Atlas Academy...</p>';
                allServants = await fetchAllServants();
                if (allServants.length === 0) throw new Error('Nenhum servo retornado pela API.');
                buildFilters();
                applyFilters();
                statusMessage.style.display = 'none';
            } catch (err) {
                statusMessage.innerHTML = `<p class="error">${err.message}</p>
                <p style="color:#aaa; margin-top:1rem;">Tente novamente ou verifique se a API está acessível.</p>`;
                console.error(err);
            }
        })();
    })();
</script>
</body>
</html>
