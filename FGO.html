<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate/Grand Order - Atlas Academy API</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --card-bg: #1a1a2e;
            --text: #e0e0e0;
            --gold: #c9a84c;
            --accent: #16213e;
            --border: #2a2a4a;
            --saber: #3b82f6;
            --archer: #22c55e;
            --lancer: #ef4444;
            --rider: #a855f7;
            --caster: #06b6d4;
            --assassin: #f59e0b;
            --berserker: #dc2626;
            --ruler: #fbbf24;
            --avenger: #4b5563;
            --mooncancer: #ec4899;
            --alterego: #f97316;
            --foreigner: #6366f1;
            --pretender: #84cc16;
            --shielder: #94a3b8;
            --beast: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(239, 68, 68, 0.06) 0%, transparent 50%);
        }

        header {
            background: linear-gradient(180deg, rgba(26, 26, 46, 0.98) 0%, rgba(26, 26, 46, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #f0d060, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        header .subtitle {
            font-size: 0.9rem;
            color: #888;
            font-weight: 300;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        .search-wrapper input {
            width: 100%;
            padding: 1rem 1.25rem;
            padding-right: 3.5rem;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 1.05rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-wrapper input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
        }

        .search-wrapper input::placeholder {
            color: #666;
        }

        .search-wrapper .search-icon {
            position: absolute;
            right: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            color: #888;
            pointer-events: none;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(201, 168, 76, 0.1);
            border-color: var(--gold);
            color: var(--text);
        }

        .filter-btn.active {
            background: rgba(201, 168, 76, 0.2);
            border-color: var(--gold);
            color: var(--gold);
            font-weight: 600;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .servant-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .servant-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--gold);
        }

        .servant-card .card-image {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: var(--accent);
            display: block;
        }

        .servant-card .card-image-placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--accent), #1a1a3e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #444;
        }

        .servant-card .card-info {
            padding: 1rem 1.25rem;
        }

        .servant-card .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .servant-card .card-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .class-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .class-saber { background: rgba(59, 130, 246, 0.2); color: var(--saber); }
        .class-archer { background: rgba(34, 197, 94, 0.2); color: var(--archer); }
        .class-lancer { background: rgba(239, 68, 68, 0.2); color: var(--lancer); }
        .class-rider { background: rgba(168, 85, 247, 0.2); color: var(--rider); }
        .class-caster { background: rgba(6, 182, 212, 0.2); color: var(--caster); }
        .class-assassin { background: rgba(245, 158, 11, 0.2); color: var(--assassin); }
        .class-berserker { background: rgba(220, 38, 38, 0.2); color: var(--berserker); }
        .class-ruler { background: rgba(251, 191, 36, 0.2); color: var(--ruler); }
        .class-avenger { background: rgba(75, 85, 99, 0.2); color: var(--avenger); }
        .class-mooncancer { background: rgba(236, 72, 153, 0.2); color: var(--mooncancer); }
        .class-alterego { background: rgba(249, 115, 22, 0.2); color: var(--alterego); }
        .class-foreigner { background: rgba(99, 102, 241, 0.2); color: var(--foreigner); }
        .class-pretender { background: rgba(132, 204, 22, 0.2); color: var(--pretender); }
        .class-shielder { background: rgba(148, 163, 184, 0.2); color: var(--shielder); }
        .class-beast { background: rgba(239, 68, 68, 0.2); color: var(--beast); }

        .stars {
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal .servant-header {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .modal .servant-avatar {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .modal .servant-title h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .modal .servant-title .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        .modal .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .modal .stat-box {
            background: var(--accent);
            border-radius: 10px;
            padding: 0.75rem;
            text-align: center;
        }

        .modal .stat-box .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.05em;
        }

        .modal .stat-box .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
        }

        .modal .detail-section {
            margin-bottom: 1.25rem;
        }

        .modal .detail-section h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.4rem;
        }

        .modal .skills-list {
            list-style: none;
        }

        .modal .skills-list li {
            padding: 0.4rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 2rem;
            color: #ef4444;
            font-weight: 500;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }
            .results-grid {
                grid-template-columns: 1fr;
            }
            .modal .servant-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>⚔️ Fate/Grand Order</h1>
    <p class="subtitle">Dados dos Servos via Atlas Academy API</p>
</header>

<div class="container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Digite o nome do servo... (ex: Artoria, Gilgamesh, Mash)" autocomplete="off">
        <span class="search-icon">🔍</span>
    </div>

    <div class="filters" id="filtersContainer">
        <button class="filter-btn active" data-class="">Todos</button>
    </div>

    <div class="results-grid" id="resultsGrid">
        <div class="loading">
            <div class="spinner"></div>
            <p>Carregando servos...</p>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    (function() {
        const API_BASE = 'https://api.atlasacademy.io';
        const REGION = 'NA';

        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const filtersContainer = document.getElementById('filtersContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        let allServants = [];
        let filteredServants = [];
        let currentClassFilter = '';
        let searchTimeout = null;

        // Class list
        const classNames = [
            'saber', 'archer', 'lancer', 'rider', 'caster',
            'assassin', 'berserker', 'ruler', 'avenger',
            'mooncancer', 'alterego', 'foreigner', 'pretender', 'shielder', 'beast'
        ];

        // Fetch all servants using search with common letters
        async function fetchAllServants() {
            const uniqueServants = new Map();
            const searchLetters = 'aeiou'.split('');

            try {
                for (const letter of searchLetters) {
                    const url = `${API_BASE}/nice/${REGION}/servant/search?name=${letter}`;
                    const response = await fetch(url);
                    if (!response.ok) continue;

                    const data = await response.json();
                    if (Array.isArray(data)) {
                        data.forEach(servant => {
                            if (servant.type === 'heroine' || servant.type === 'normal') {
                                if (!uniqueServants.has(servant.id)) {
                                    uniqueServants.set(servant.id, servant);
                                }
                            }
                        });
                    }
                }
            } catch (err) {
                console.error('Erro ao buscar servos:', err);
            }

            return Array.from(uniqueServants.values());
        }

        // Render filters
        function renderFilters() {
            const activeClasses = new Set();
            allServants.forEach(s => {
                if (s.className) activeClasses.add(s.className.toLowerCase());
            });

            filtersContainer.innerHTML = '<button class="filter-btn active" data-class="">Todos</button>';
            classNames.forEach(cls => {
                if (activeClasses.has(cls)) {
                    const btn = document.createElement('button');
                    btn.className = `filter-btn`;
                    btn.dataset.class = cls;
                    btn.textContent = cls.charAt(0).toUpperCase() + cls.slice(1);
                    filtersContainer.appendChild(btn);
                }
            });

            // Filter events
            filtersContainer.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    filtersContainer.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentClassFilter = btn.dataset.class;
                    applyFilters();
                });
            });
        }

        // Apply search + class filter
        function applyFilters() {
            const query = searchInput.value.toLowerCase().trim();

            filteredServants = allServants.filter(servant => {
                // Class filter
                if (currentClassFilter && servant.className?.toLowerCase() !== currentClassFilter) {
                    return false;
                }
                // Name filter
                if (query) {
                    const name = (servant.name || '').toLowerCase();
                    const originalName = (servant.originalName || '').toLowerCase();
                    return name.includes(query) || originalName.includes(query);
                }
                return true;
            });

            renderResults();
        }

        // Get class CSS
        function getClassCSS(className) {
            const cls = (className || '').toLowerCase();
            return `class-${cls}`;
        }

        // Get star string
        function getStars(rarity) {
            return '★'.repeat(rarity || 0);
        }

        // Get servant image
        function getServantImage(servant) {
            try {
                const assets = servant.extraAssets || {};
                const charaGraph = assets.charaGraph || {};
                const ascension = charaGraph.ascension || {};
                // Use ascension stage 1 image
                return ascension['1'] || null;
            } catch {
                return null;
            }
        }

        // Render results grid
        function renderResults() {
            if (filteredServants.length === 0) {
                resultsGrid.innerHTML = '<div class="no-results">Nenhum servo encontrado.</div>';
                return;
            }

            resultsGrid.innerHTML = filteredServants.map(servant => {
                const img = getServantImage(servant);
                const imageHTML = img
                    ? `<img src="${img}" alt="${servant.name}" class="card-image" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
                    : '';
                const placeholderHTML = !img
                    ? `<div class="card-image-placeholder">⚔️</div>`
                    : `<div class="card-image-placeholder" style="display:none;">⚔️</div>`;

                return `
                    <div class="servant-card" data-id="${servant.id}" data-collection="${servant.collectionNo}">
                        ${imageHTML}
                        ${placeholderHTML}
                        <div class="card-info">
                            <div class="card-name">${servant.name || 'Desconhecido'}</div>
                            <div class="card-meta">
                                <span class="class-badge ${getClassCSS(servant.className)}">${servant.className || '???'}</span>
                                <span class="stars">${getStars(servant.rarity)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Add click listeners
            resultsGrid.querySelectorAll('.servant-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    const collection = card.dataset.collection;
                    const servant = allServants.find(s => s.id == id || s.collectionNo == collection);
                    if (servant) openModal(servant);
                });
            });
        }

        // Open modal with servant details
        async function openModal(servant) {
            // Fetch full details with lore
            let detailedServant = servant;
            try {
                const url = `${API_BASE}/nice/${REGION}/servant/${servant.collectionNo || servant.id}?lore=true`;
                const resp = await fetch(url);
                if (resp.ok) {
                    detailedServant = await resp.json();
                }
            } catch (e) {
                // use basic data
            }

            const img = getServantImage(detailedServant) || '';

            const skills = detailedServant.skills || [];
            const passiveSkills = detailedServant.passiveSkills || detailedServant.classPassive || [];
            const noblePhantasms = detailedServant.noblePhantasms || [];

            modalBody.innerHTML = `
                <div class="servant-header">
                    ${img ? `<img src="${img}" alt="${detailedServant.name}" class="servant-avatar" onerror="this.style.display='none';">` : ''}
                    <div class="servant-title">
                        <h2>${detailedServant.name || 'Desconhecido'}</h2>
                        <p class="subtitle">${detailedServant.originalName || ''}</p>
                        <div style="margin-top:0.5rem;">
                            <span class="class-badge ${getClassCSS(detailedServant.className)}">${detailedServant.className || '???'}</span>
                            <span class="stars" style="margin-left:0.5rem;">${getStars(detailedServant.rarity)}</span>
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">HP Máx</div>
                        <div class="stat-value">${detailedServant.hpMax || '?'}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">ATK Máx</div>
                        <div class="stat-value">${detailedServant.atkMax || '?'}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Custo</div>
                        <div class="stat-value">${detailedServant.cost || '?'}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Nível Máx</div>
                        <div class="stat-value">${detailedServant.lvMax || '?'}</div>
                    </div>
                </div>

                ${skills.length > 0 ? `
                <div class="detail-section">
                    <h3>⚡ Habilidades Ativas</h3>
                    <ul class="skills-list">
                        ${skills.map(s => `<li><strong>${s.name || '???'}</strong> ${s.ruby || ''}</li>`).join('')}
                    </ul>
                </div>
                ` : ''}

                ${passiveSkills.length > 0 ? `
                <div class="detail-section">
                    <h3>🛡️ Habilidades Passivas</h3>
                    <ul class="skills-list">
                        ${passiveSkills.map(s => `<li><strong>${s.name || '???'}</strong> ${s.ruby || ''}</li>`).join('')}
                    </ul>
                </div>
                ` : ''}

                ${noblePhantasms.length > 0 ? `
                <div class="detail-section">
                    <h3>✨ Noble Phantasm</h3>
                    <ul class="skills-list">
                        ${noblePhantasms.map(np => `
                            <li>
                                <strong>${np.name || '???'}</strong>
                                ${np.card ? ` <span style="color:#aaa;">[${np.card}]</span>` : ''}
                                ${np.rank ? ` <span style="color:#888;">Rank ${np.rank}</span>` : ''}
                            </li>
                        `).join('')}
                    </ul>
                </div>
                ` : ''}

                ${detailedServant.profile?.illustrator ? `
                <div class="detail-section">
                    <h3>📋 Informações</h3>
                    <p style="font-size:0.85rem; color:#aaa;">Ilustrador: ${detailedServant.profile.illustrator}</p>
                    ${detailedServant.profile.cv ? `<p style="font-size:0.85rem; color:#aaa;">CV: ${detailedServant.profile.cv}</p>` : ''}
                </div>
                ` : ''}
            `;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Event listeners
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFilters, 300);
        });

        // Init
        async function init() {
            resultsGrid.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando servos...</p>
                </div>
            `;

            allServants = await fetchAllServants();
            // Sort by collection number
            allServants.sort((a, b) => (a.collectionNo || 0) - (b.collectionNo || 0));

            renderFilters();
            applyFilters();
        }

        init();
    })();
</script>

</body>
</html>
