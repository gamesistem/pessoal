<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Buscador de Poderes</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0d1a;
    --bg2:       #13132a;
    --bg3:       #1c1c38;
    --bg4:       #252545;
    --accent:    #e94560;
    --accent2:   #ff6b35;
    --text:      #e8e8f0;
    --text-dim:  #7070a0;
    --border:    #2a2a50;

    --buff:      #4caf8a;
    --buff-bg:   #0e2a1e;
    --debuff:    #e05252;
    --debuff-bg: #2a0e0e;
    --ativa:     #5b9bd5;
    --ativa-bg:  #0e1d2a;
    --passiva:   #a47fd4;
    --passiva-bg:#1e122a;
    --trans:     #e6b44a;
    --trans-bg:  #2a200a;
    --cosm:      #8888aa;
    --cosm-bg:   #16162a;

    --origins:   #40c0c8;
    --monster:   #e07840;
    --mobs:      #60c060;
    --fantasy:   #c870c8;
    --magic:     #5080e0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background stars ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, #1a1a4a 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #2a0a1a 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--op, 0.6); }
  }

  /* ── App container ── */
  #app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 40px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px #e9456044;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--text) 40%, var(--text-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #count-lbl {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    white-space: nowrap;
  }

  /* ── Search row ── */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text-dim);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--bg2);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 42px;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }

  #search::placeholder { color: var(--text-dim); }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px #e9456018;
  }

  #btn-clear {
    width: 44px;
    height: 44px;
    background: var(--bg2);
    color: var(--text-dim);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: background .15s, color .15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #btn-clear:hover { background: var(--bg3); color: var(--text); }

  /* ── Filter rows ── */
  .filter-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .filter-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    min-width: 64px;
  }

  .filter-btn {
    background: var(--bg2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 13px;
    font-size: 11.5px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
  }
  .filter-btn:hover:not(.active) {
    background: var(--bg3);
    color: var(--text);
  }
  .filter-btn.active {
    font-weight: 700;
  }

  /* Category button active states */
  .filter-btn[data-cat="Todos"].active    { background:#e9456018; color: var(--accent);  border-color: #e9456055; }
  .filter-btn[data-cat="buff"].active     { background:#4caf8a18; color: var(--buff);    border-color: #4caf8a55; }
  .filter-btn[data-cat="debuff"].active   { background:#e0525218; color: var(--debuff);  border-color: #e0525255; }
  .filter-btn[data-cat="ativa"].active    { background:#5b9bd518; color: var(--ativa);   border-color: #5b9bd555; }
  .filter-btn[data-cat="passiva"].active  { background:#a47fd418; color: var(--passiva); border-color: #a47fd455; }
  .filter-btn[data-cat="transformação"].active { background:#e6b44a18; color: var(--trans); border-color: #e6b44a55; }
  .filter-btn[data-cat="cosmético"].active{ background:#8888aa18; color: var(--cosm);   border-color: #8888aa55; }

  /* Origin button active states */
  .filter-btn[data-orig="Todas"].active   { background:#e9456018; color: var(--accent);  border-color: #e9456055; }
  .filter-btn[data-orig="Origins"].active { background:#40c0c818; color: var(--origins); border-color: #40c0c855; }
  .filter-btn[data-orig="Monster"].active { background:#e0784018; color: var(--monster); border-color: #e0784055; }
  .filter-btn[data-orig="Mobs"].active    { background:#60c06018; color: var(--mobs);    border-color: #60c06055; }
  .filter-btn[data-orig="Fantasy"].active { background:#c870c818; color: var(--fantasy); border-color: #c870c855; }
  .filter-btn[data-orig="Magic"].active   { background:#5080e018; color: var(--magic);   border-color: #5080e055; }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  /* ── Results ── */
  #results {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── No results ── */
  .no-results {
    text-align: center;
    color: var(--text-dim);
    font-size: 15px;
    padding: 60px 20px;
    animation: fadeIn .3s ease;
  }
  .no-results .emoji { font-size: 40px; display: block; margin-bottom: 12px; }

  /* ── Card ── */
  .card {
    border-radius: 10px;
    border-left-width: 3px;
    border-left-style: solid;
    border-top: 1px solid;
    border-right: 1px solid;
    border-bottom: 1px solid;
    padding: 12px 16px;
    animation: slideIn .2s ease;
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover {
    transform: translateX(3px);
    box-shadow: -4px 0 16px currentColor;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .card[data-cat="buff"]         { background: var(--buff-bg);    border-color: #4caf8a28; border-left-color: var(--buff); }
  .card[data-cat="debuff"]       { background: var(--debuff-bg);  border-color: #e0525228; border-left-color: var(--debuff); }
  .card[data-cat="ativa"]        { background: var(--ativa-bg);   border-color: #5b9bd528; border-left-color: var(--ativa); }
  .card[data-cat="passiva"]      { background: var(--passiva-bg); border-color: #a47fd428; border-left-color: var(--passiva); }
  .card[data-cat="transformação"]{ background: var(--trans-bg);   border-color: #e6b44a28; border-left-color: var(--trans); }
  .card[data-cat="cosmético"]    { background: var(--cosm-bg);    border-color: #8888aa28; border-left-color: var(--cosm); }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 5px;
    border-width: 1px;
    border-style: solid;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-buff       { background:#4caf8a18; color: var(--buff);    border-color: #4caf8a44; }
  .badge-debuff     { background:#e0525218; color: var(--debuff);  border-color: #e0525244; }
  .badge-ativa      { background:#5b9bd518; color: var(--ativa);   border-color: #5b9bd544; }
  .badge-passiva    { background:#a47fd418; color: var(--passiva); border-color: #a47fd444; }
  .badge-transform  { background:#e6b44a18; color: var(--trans);   border-color: #e6b44a44; }
  .badge-cosm       { background:#8888aa18; color: var(--cosm);    border-color: #8888aa44; }

  .card-name {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    min-width: 0;
  }

  .orig-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    border-width: 1px;
    border-style: solid;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .orig-Origins { color: var(--origins); background:#40c0c818; border-color: #40c0c840; }
  .orig-Monster { color: var(--monster); background:#e0784018; border-color: #e0784040; }
  .orig-Mobs    { color: var(--mobs);    background:#60c06018; border-color: #60c06040; }
  .orig-Fantasy { color: var(--fantasy); background:#c870c818; border-color: #c870c840; }
  .orig-Magic   { color: var(--magic);   background:#5080e018; border-color: #5080e040; }

  .card-desc {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .highlight {
    background: #e9456030;
    color: #ff8888;
    font-weight: 700;
    border-radius: 3px;
    padding: 0 2px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: #303060; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #404080; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    h1 { font-size: 20px; }
    .logo-icon { width: 36px; height: 36px; font-size: 18px; }
    .filter-btn { padding: 4px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<div id="stars"></div>

      <h1>Buscador de Poderes</h1>

  </div>

  <div class="filter-row">

  <div class="filter-row">
    <span class="filter-label">Origem</span>

    <button class="filter-btn" data-orig="Origins">Origins</button>

    <button class="filter-btn" data-orig="Magic">Magic</button>
  </div>

  <hr class="divider">

  <div id="results"></div>
</div>

    const el = document.createElement('div');

    const size = Math.random() * 2 + 0.5;

      left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      --d:${(Math.random()*4+2).toFixed(1)}s;
      --op:${(Math.random()*0.5+0.2).toFixed(2)};

    `;
    s.appendChild(el);
  }
})();

// ── State ────────────────────────────────────────────────────────────────────
let activeCat  = "Todos";
let activeOrig = "Todas";
let searchTimer = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, q) {
  if (!q || q.length < 2) return escHtml(text);
  const safe = escHtml(text);
  const safeQ = escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return safe.replace(new RegExp(`(${safeQ})`,'gi'),
    '<span class="highlight">$1</span>');
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const q    = document.getElementById('search').value.toLowerCase().trim();
  const cat  = activeCat;
  const orig = activeOrig;

  const filtered = PODERES.filter(([c, nome, o, desc]) => {
    if (cat  !== "Todos"  && c !== cat)  return false;
    if (orig !== "Todas"  && o !== orig) return false;
    if (q && !nome.toLowerCase().includes(q) && !desc.toLowerCase().includes(q)
          && !o.toLowerCase().includes(q)    && !c.toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('count-lbl').textContent =
    `${filtered.length} de ${PODERES.length} poderes`;

  const container = document.getElementById('results');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <span class="emoji">🔎</span>
        Nenhum poder encontrado.<br>Tente outros termos ou filtros.
      </div>`;
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.forEach(([cat, nome, orig, desc]) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.cat = cat;
    div.innerHTML = `
      <div class="card-top">
        <span class="badge ${CAT_BADGE_CLASS[cat] || ''}">${CAT_EMOJI[cat] || '?'} ${cat.toUpperCase()}</span>
        <span class="card-name">${highlight(nome, q)}</span>
        <span class="orig-badge orig-${orig}">${orig}</span>
      </div>
      <div class="card-desc">${highlight(desc, q)}</div>
    `;
    frag.appendChild(div);
  });

  container.innerHTML = '';
  container.appendChild(frag);
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 160);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('search').value = '';
  render();
});

document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCat = btn.dataset.cat;
    render();
  });
});

document.querySelectorAll('.filter-btn[data-orig]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-orig]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeOrig = btn.dataset.orig;
    render();
  });
});

// ── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
