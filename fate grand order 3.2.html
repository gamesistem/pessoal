<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FGO Story Reader - Corrigido</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #444; overflow-y: auto; padding: 10px; background: #1a1a1a; }
        #content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .chapter-btn { 
            display: block; width: 100%; padding: 10px; margin-bottom: 5px; 
            background: #333; color: white; border: none; cursor: pointer; text-align: left;
            border-radius: 4px;
        }
        .chapter-btn:hover { background: #444; }
        select { width: 100%; padding: 10px; margin-bottom: 20px; background: #000; color: white; font-size: 16px; }
        #story-text { white-space: pre-wrap; line-height: 1.6; font-size: 18px; max-width: 800px; margin: 0 auto; }
        .speaker { color: #58a6ff; font-weight: bold; margin-top: 15px; display: block; }
        .dialogue { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        #loader { color: #ffcc00; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Capítulos</h3>
    <div id="loader-sidebar">Carregando lista...</div>
    <div id="chapter-list"></div>
</div>

<div id="content">
    <div id="status-msg">Selecione um capítulo à esquerda.</div>
    <select id="quest-selector" style="display:none"></select>
    <div id="story-text"></div>
</div>

<script>
    // Usando um Proxy para evitar o erro de CORS ao abrir arquivo local
    const PROXY = "https://corsproxy.io/?";
    const API_BASE = "https://api.atlasacademy.io";
    const REGION = "JP"; // JP tem todas as histórias, incluindo Ordeal Call

    const chapterList = document.getElementById('chapter-list');
    const questSelector = document.getElementById('quest-selector');
    const storyText = document.getElementById('story-text');
    const statusMsg = document.getElementById('status-msg');

    // 1. Carregar Capítulos
    async function loadChapters() {
        try {
            const url = `${PROXY}${encodeURIComponent(API_BASE + '/export/' + REGION + '/basic_war.json')}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error("Erro na rede");
            const data = await response.json();
            
            // Filtra os capítulos da história principal
            const mainStory = data.filter(w => w.id < 1000 || (w.id >= 2000 && w.id < 4000));
            
            document.getElementById('loader-sidebar').style.display = 'none';
            chapterList.innerHTML = mainStory.map(war => `
                <button class="chapter-btn" onclick="loadQuests(${war.id})">
                    ${war.longName}
                </button>
            `).join('');
        } catch (err) {
            document.getElementById('loader-sidebar').innerText = "Erro ao carregar capítulos. Tente atualizar a página.";
            console.error(err);
        }
    }

    // 2. Carregar Quests do Capítulo
    async function loadQuests(warId) {
        statusMsg.innerText = "Carregando seções da história...";
        questSelector.style.display = 'none';
        storyText.innerHTML = "";

        try {
            const url = `${PROXY}${encodeURIComponent(API_BASE + '/export/' + REGION + '/nice_war/' + warId + '.json')}`;
            const response = await fetch(url);
            const data = await response.json();

            questSelector.innerHTML = '<option value="">-- Selecione uma seção --</option>';
            let hasQuests = false;

            data.spots.forEach(spot => {
                spot.quests.forEach(q => {
                    if (q.scriptId) {
                        const opt = document.createElement('option');
                        opt.value = q.scriptId;
                        opt.innerText = q.name;
                        questSelector.appendChild(opt);
                        hasQuests = true;
                    }
                });
            });

            if (hasQuests) {
                questSelector.style.display = 'block';
                statusMsg.innerText = "Escolha uma seção abaixo:";
            } else {
                statusMsg.innerText = "Nenhuma história encontrada neste capítulo.";
            }
        } catch (err) {
            statusMsg.innerText = "Erro ao carregar quests.";
        }
    }

    // 3. Carregar o Texto (Script)
    async function loadScript(scriptId) {
        if (!scriptId) return;
        statusMsg.innerText = "Lendo história...";
        storyText.innerHTML = "Carregando texto...";

        try {
            const url = `${PROXY}${encodeURIComponent(API_BASE + '/script/' + REGION + '/' + scriptId)}`;
            const response = await fetch(url);
            const data = await response.json();

            let fullHtml = "";
            data.components.forEach(c => {
                if (c.type === "talk" && c.talk) {
                    const speaker = c.talk.speakerName || "---";
                    const cleanMsg = c.talk.text.replace(/\[\w+\]/g, '').replace(/\{ruby\(.*?,(.*?)\)\}/g, '$1');
                    
                    fullHtml += `<div class="dialogue">
                        <span class="speaker">${speaker}:</span>
                        <span>${cleanMsg.replace(/\n/g, '<br>')}</span>
                    </div>`;
                }
            });

            storyText.innerHTML = fullHtml || "Fim da seção ou apenas batalha.";
            statusMsg.innerText = "Leitura concluída.";
        } catch (err) {
            storyText.innerHTML = "Erro ao carregar o texto.";
        }
    }

    questSelector.addEventListener('change', (e) => loadScript(e.target.value));

    // Iniciar
    loadChapters();
</script>

</body>
</html>
